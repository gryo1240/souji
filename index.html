<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#6C5FA7">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="そうじ">
</head>
<body>
<title>そうじナビ</title>
<style>
:root{
  --bg:#F5F4F7; --surface:#FFFFFF; --ink:#292633; --muted:#716D80;
  --line:#E1DFE8; --accent:#6C5FA7; --accent-ink:#FFFFFF; --accent-soft:#ECE9F5;
  --warn:#B0563B; --warn-soft:#F6E9E3; --chip:#EDEBF2; --ok:#3E7A52; --okbg:#E5F0E9;
  --whoA:#B4643C; --whoB:#4A7FA5; --shadow:0 1px 3px rgba(40,35,60,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#17151D; --surface:#211E2A; --ink:#E7E5EC; --muted:#9B97A8;
    --line:#363242; --accent:#A79BD6; --accent-ink:#191430; --accent-soft:#2C2741;
    --warn:#D69073; --warn-soft:#3A2A21; --chip:#2C2937; --ok:#7FBE97; --okbg:#233A2C;
    --whoA:#D89468; --whoB:#83AECE; --shadow:0 1px 3px rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --bg:#F5F4F7; --surface:#FFFFFF; --ink:#292633; --muted:#716D80;
  --line:#E1DFE8; --accent:#6C5FA7; --accent-ink:#FFFFFF; --accent-soft:#ECE9F5;
  --warn:#B0563B; --warn-soft:#F6E9E3; --chip:#EDEBF2; --ok:#3E7A52; --okbg:#E5F0E9;
  --whoA:#B4643C; --whoB:#4A7FA5; --shadow:0 1px 3px rgba(40,35,60,.08);
}
:root[data-theme="dark"]{
  --bg:#17151D; --surface:#211E2A; --ink:#E7E5EC; --muted:#9B97A8;
  --line:#363242; --accent:#A79BD6; --accent-ink:#191430; --accent-soft:#2C2741;
  --warn:#D69073; --warn-soft:#3A2A21; --chip:#2C2937; --ok:#7FBE97; --okbg:#233A2C;
  --whoA:#D89468; --whoB:#83AECE; --shadow:0 1px 3px rgba(0,0,0,.35);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Noto Sans JP",Meiryo,sans-serif;
  font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased;}
#app{max-width:720px; margin:0 auto; padding:0 14px 84px;}
header.top{position:sticky; top:0; z-index:20; background:var(--bg);
  padding:14px 2px 10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line);}
header.top h1{font-size:18px; font-weight:700; letter-spacing:.02em;}
header.top .sub{color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums;}
.dot{width:9px; height:9px; border-radius:50%; background:var(--muted); margin-left:auto; flex-shrink:0;}
.dot.on{background:var(--ok);}
main{padding-top:14px;}
h2{font-size:15px; font-weight:700; letter-spacing:.04em; margin:18px 0 8px;}
.small{font-size:12.5px; color:var(--muted);}
.card{background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:10px;}
button{font:inherit; cursor:pointer; border:none; border-radius:8px; padding:8px 14px; background:var(--chip); color:var(--ink);}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
button.primary{background:var(--accent); color:var(--accent-ink); font-weight:700;}
button.ghost{background:transparent; border:1px solid var(--line);}
button.icon{padding:6px 10px; font-size:14px; line-height:1;}
select,input[type=text],input[type=date],textarea{font:inherit; color:var(--ink); background:var(--surface);
  border:1px solid var(--line); border-radius:8px; padding:7px 10px; max-width:100%;}
textarea{width:100%; min-height:90px;}
.row{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
.grow{flex:1 1 auto; min-width:0;}
nav.tabs{position:fixed; bottom:0; left:0; right:0; z-index:30; background:var(--surface); border-top:1px solid var(--line); display:flex; justify-content:center;}
nav.tabs .inner{display:flex; width:100%; max-width:720px;}
nav.tabs button{flex:1; background:none; border-radius:0; padding:10px 0 12px; font-size:11.5px; color:var(--muted); display:flex; flex-direction:column; gap:2px; align-items:center;}
nav.tabs button .ic{font-size:18px; line-height:1;}
nav.tabs button.on{color:var(--accent); font-weight:700;}
/* place chips */
.placebar{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px;}
.placebar button{white-space:nowrap; border:1px solid var(--line); background:var(--surface); font-size:13px; padding:6px 13px; border-radius:999px;}
.placebar button.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700;}
/* stain rows */
.stain{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid var(--line);}
.stain:last-child{border-bottom:none;}
.stain input[type=checkbox]{width:22px; height:22px; accent-color:var(--accent); flex-shrink:0;}
.stain .nm{flex:1; min-width:0; background:none; border:none; padding:0; font:inherit; text-align:left; color:var(--ink);}
.stain .nm .t{font-weight:600;}
.stain .nm .s{font-size:12px; color:var(--muted);}
.stain.done .nm .t{text-decoration:line-through; color:var(--muted);}
.stain.skipped .nm .t{color:var(--muted); opacity:.6;}
.star{color:var(--accent); font-size:12px; letter-spacing:1px;}
.who{display:inline-block; width:10px; height:10px; border-radius:50%; flex-shrink:0;}
.who.a{background:var(--whoA);} .who.b{background:var(--whoB);}
.who.ab{background:linear-gradient(90deg,var(--whoA) 50%,var(--whoB) 50%);}
.chip{display:inline-block; font-size:12px; padding:3px 10px; border-radius:999px; background:var(--chip); color:var(--ink);}
.chip.ng{background:var(--warn-soft); color:var(--warn); font-weight:700;}
.chip.ok{background:var(--okbg); color:var(--ok); font-weight:700;}
/* progress */
.pbar{height:10px; background:var(--chip); border-radius:999px; overflow:hidden;}
.pbar>div{height:100%; background:var(--accent); border-radius:999px; transition:width .3s;}
@media (prefers-reduced-motion: reduce){ .pbar>div{transition:none;} }
.pnum{font-variant-numeric:tabular-nums;}
/* detail sheet */
.overlay{position:fixed; inset:0; background:rgba(16,12,24,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center;}
.sheet{background:var(--surface); width:100%; max-width:720px; max-height:88vh; border-radius:14px 14px 0 0; padding:16px 16px 24px; overflow-y:auto;}
.sheet h3{font-size:16px; margin-bottom:4px;}
.steps{margin:6px 0 0; padding-left:1.5em;}
.steps li{margin-bottom:8px; font-size:14px;}
.warnbox{background:var(--warn-soft); border-radius:8px; padding:9px 12px; font-size:13px; margin-top:10px; color:var(--ink);}
.warnbox b{color:var(--warn);}
.depbox{background:var(--okbg); border-radius:8px; padding:9px 12px; font-size:13px; margin-top:8px;}
.toolchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.f-row{margin:12px 0;}
.f-row .lbl{font-size:12.5px; color:var(--muted); font-weight:700; letter-spacing:.05em; margin-bottom:5px;}
.seg{display:flex; flex-wrap:wrap; gap:6px;}
.seg button{padding:6px 12px; font-size:13px; border:1px solid var(--line); background:var(--surface);}
.seg button.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700;}
/* before/after photos */
.ba{display:flex; gap:10px; margin-top:6px;}
.ba .slot{flex:1; text-align:center;}
.ba .slot .cap{font-size:11.5px; color:var(--muted); margin-bottom:3px;}
.ba img{width:100%; max-width:150px; aspect-ratio:1; object-fit:cover; border-radius:10px; border:1px solid var(--line);}
.ba button{width:100%; max-width:150px; aspect-ratio:1; border:1.5px dashed var(--line); border-radius:10px; background:none; color:var(--muted); font-size:12.5px;}
/* plan */
.weekcard{border-left:4px solid var(--line); padding-left:10px; margin-bottom:12px;}
.weekcard.now{border-left-color:var(--accent);}
.weekcard .wt{font-weight:700; font-size:14px;}
.notice{background:var(--warn-soft); border-radius:8px; padding:10px 12px; font-size:13.5px; margin-bottom:10px;}
/* shopping */
.shop-item{display:flex; align-items:center; gap:10px; padding:8px 2px; border-bottom:1px solid var(--line);}
.shop-item:last-child{border-bottom:none;}
.shop-item input[type=checkbox]{width:20px; height:20px; accent-color:var(--accent);}
.shop-item.done .nm2{text-decoration:line-through; color:var(--muted);}
details{margin-top:8px;}
details summary{cursor:pointer; font-size:13.5px; padding:4px 0; font-weight:600;}
.article h4{font-size:14px; margin:12px 0 4px;}
.article p,.article li{font-size:13.5px;}
.article ul,.article ol{padding-left:1.4em;}
</style>

<div id="app">
  <header class="top"><h1>そうじナビ</h1><span class="sub" id="hSub"></span><span class="dot" id="syncDot"></span></header>
  <main>
    <section id="tab-find"></section>
    <section id="tab-check" hidden></section>
    <section id="tab-plan" hidden></section>
    <section id="tab-know" hidden></section>
    <section id="tab-settings" hidden></section>
  </main>
</div>
<nav class="tabs"><div class="inner">
  <button data-tab="find" class="on"><span class="ic">🔍</span>調べる</button>
  <button data-tab="check"><span class="ic">✅</span>チェック</button>
  <button data-tab="plan"><span class="ic">📅</span>計画</button>
  <button data-tab="know"><span class="ic">💡</span>知識</button>
  <button data-tab="settings"><span class="ic">⚙️</span>設定</button>
</div></nav>
<div id="modal"></div>
<input type="file" id="photoInput" accept="image/*" hidden>

const KEY="souji-v1";

function parseDate(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }

let S=load();
function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ const s=JSON.parse(raw); if(s&&s.settings) return s; } }catch(e){}
  return { settings:{cfg:null, rid:null},
           local:{meta:{names:{a:"夫",b:"妻"},due:""}, items:{}, tools:{}}, mirror:null };
}
let saveFailWarned=false;
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ if(!saveFailWarned){ saveFailWarned=true;
    alert("端末内の保存容量がいっぱいで、変更を保存できませんでした。写真を減らしてください。"); } }
}
let ROOM=S.local, fbRef=null, connected=false;
const syncOn=()=>!!(S.settings.cfg && S.settings.rid);
function names(){ const n=(ROOM.meta&&ROOM.meta.names)||{}; return {a:n.a||"夫", b:n.b||"妻"}; }
function itemState(id){ return (ROOM.items&&ROOM.items[id])||{}; }
function due(){ return (ROOM.meta&&ROOM.meta.due)||""; }
function mutate(pathArr,val){
  if(syncOn()&&fbRef){ fbRef.child(pathArr.join("/")).set(val===undefined?null:val); }
  else{
    let o=ROOM;
    for(let i=0;i<pathArr.length-1;i++){ const k=pathArr[i]; if(typeof o[k]!=="object"||o[k]===null) o[k]={}; o=o[k]; }
    const last=pathArr[pathArr.length-1];
    if(val===null||val===undefined) delete o[last]; else o[last]=val;
    save(); render();
  }
}
/* ---- Firebase(他アプリと同じ仕組み) ---- */
function loadFirebaseSdk(cb){
  if(window.firebase&&firebase.database){ cb(); return; }
  const s1=document.createElement("script");
  s1.src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js";
  s1.onload=()=>{ const s2=document.createElement("script");
    s2.src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js";
    s2.onload=cb; s2.onerror=()=>setStatus(false); document.head.appendChild(s2); };
  s1.onerror=()=>setStatus(false);
  document.head.appendChild(s1);
}
function connect(){
  if(!syncOn()) return;
  loadFirebaseSdk(()=>{
    try{
      if(!firebase.apps.length) firebase.initializeApp(S.settings.cfg);
      const db=firebase.database();
      fbRef=db.ref("souji/"+S.settings.rid);
      fbRef.on("value",snap=>{ ROOM=snap.val()||{}; if(!ROOM.meta) ROOM.meta={names:{a:"夫",b:"妻"},due:""};
        S.mirror=ROOM; save(); render(); });
      db.ref(".info/connected").on("value",s=>{ connected=!!s.val(); setStatus(connected); });
    }catch(e){ alert("同期の接続に失敗しました: "+e.message); }
  });
}
function setStatus(on){
  const d=$("#syncDot"); if(!d) return;
  d.className="dot"+(on?" on":"");
  d.title=syncOn()?(on?"同期中":"オフライン"):"同期未設定(この端末のみ)";
}
function parseConfig(text){
  const cfg={}; const re=/["']?(\w+)["']?\s*:\s*["']([^"']+)["']/g; let m;
  while((m=re.exec(text))) cfg[m[1]]=m[2];
  if(!cfg.apiKey||!cfg.projectId) return null;
  if(!cfg.databaseURL){ const u=text.match(/https:\/\/[\w.-]+firebasedatabase\.app/); if(u) cfg.databaseURL=u[0]; else return {noDb:true}; }
  return {cfg};
}
function inviteCode(){ return btoa(unescape(encodeURIComponent(JSON.stringify({app:"souji", c:S.settings.cfg, r:S.settings.rid})))); }

/* ============ 写真(端末内で縮小保存) ============ */
function fileToThumb(file, max){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement("canvas");
      cv.width=Math.max(1,Math.round(img.width*sc)); cv.height=Math.max(1,Math.round(img.height*sc));
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(img.src);
      resolve(cv.toDataURL("image/jpeg",0.65));
    };
    img.onerror=()=>{ URL.revokeObjectURL(img.src); reject(new Error("画像を読み込めませんでした")); };
    img.src=URL.createObjectURL(file);
  });
}
let photoTarget=null; // {id, slot:"bphoto"|"aphoto"}
function pickPhoto(id,slot){ photoTarget={id,slot}; $("#photoInput").click(); }
$("#photoInput").addEventListener("change", async e=>{

  const target=photoTarget; photoTarget=null;
  if(!f||!target) return;
  try{

    mutate(["items",target.id,target.slot],url);

  }catch(err){ alert(err.message||"写真を読み込めませんでした"); }
});

function renderFind(){
  const el=$("#tab-find");
  const place=el.dataset.place||PLACES[0];
  const q=el.dataset.q||"";
  let list = q ? ST.filter(s=>s.name.includes(q)||s.look.includes(q)||s.place.includes(q))
               : ST.filter(s=>s.place===place);
  let html=`<div class="card">
    <input type="text" id="findQ" placeholder="汚れの見た目で検索(例: 黒い、ベタベタ、白い塊)" value="${esc(q)}" style="width:100%">
  </div>`;
  if(!q){
    html+=`<div class="placebar">${PLACES.map(p=>`<button data-place="${esc(p)}" class="${p===place?"on":""}">${esc(p)}</button>`).join("")}</div>`;
  }
  html+=`<div class="card">`;
  if(!list.length) html+=`<p class="small">見つかりませんでした。場所タブから探してみてください。</p>`;
  list.forEach(s=>{
    const st=itemState(s.id);
    html+=`<div class="stain ${st.done?"done":""} ${st.skip?"skipped":""}">
      <button class="nm" data-open="${s.id}">
        <div class="t">${esc(s.name)} ${st.done?"✅":""}</div>
        <div class="s"><span class="star">${stars(s.pr)}</span> ${esc(s.look)} / 約${s.time}分</div>
      </button>
    </div>`;
  });
  html+=`</div><p class="small">★が多いほど退去立会いで見られやすい箇所。名前をタップすると落とし方が出ます。</p>`;
  el.innerHTML=html;
  $("#findQ").oninput=e=>{ el.dataset.q=e.target.value; renderFind(); const i=$("#findQ"); i.focus(); i.setSelectionRange(i.value.length,i.value.length); };
  el.querySelectorAll("[data-place]").forEach(b=>b.onclick=()=>{ el.dataset.place=b.dataset.place; renderFind(); });
  el.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openDetail(b.dataset.open));
}

  $("#dSkip").onclick=()=>{ mutate(["items",id,"skip"],!st.skip||null); m.innerHTML=""; };
  $("#dClose").onclick=()=>m.innerHTML="";
  $("#ov").onclick=e=>{ if(e.target.id==="ov") m.innerHTML=""; };
}

/* ============ チェック(進捗) ============ */
function renderCheck(){
  const el=$("#tab-check");
  const act=activeStains();
  const dn=doneCount(act);
  const pct=act.length?Math.round(dn/act.length*100):0;
  let html=`<div class="card">
    <div class="row"><b class="grow">全体の進捗</b><span class="pnum">${dn} / ${act.length} (${pct}%)</span></div>
    <div class="pbar" style="margin-top:6px"><div style="width:${pct}%"></div></div>
  </div>`;
  PLACES.forEach(p=>{
    const items=ST.filter(s=>s.place===p);
    const actP=items.filter(s=>!itemState(s.id).skip);
    const dnP=doneCount(actP);
    html+=`<h2>${esc(p)} <span class="small pnum">${dnP}/${actP.length}</span></h2><div class="card">`;
    items.forEach(s=>{
      const st=itemState(s.id);
      html+=`<div class="stain ${st.done?"done":""} ${st.skip?"skipped":""}">
        <input type="checkbox" data-done="${s.id}" ${st.done?"checked":""} ${st.skip?"disabled":""}>
        <button class="nm" data-open="${s.id}">
          <div class="t">${esc(s.name)}${st.skip?"(対象外)":""}</div>
          <div class="s"><span class="star">${stars(s.pr)}</span> 約${s.time}分 ${st.bphoto||st.aphoto?"📷":""}</div>
        </button>
        ${st.who?`<span class="who ${st.who}"></span>`:""}
      </div>`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll("[data-done]").forEach(c=>c.onchange=()=>mutate(["items",c.dataset.done,"done"],c.checked||null));
  el.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openDetail(b.dataset.open));
}

/* ============ 計画 ============ */
function weekPlan(){
  const d=due(); if(!d) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const dueD=parseDate(d);
  const daysLeft=Math.ceil((dueD-today)/86400000);
  const weeks=Math.max(1, Math.ceil(daysLeft/7));
  const plan=Array.from({length:weeks},()=>[]);
  activeStains().forEach(s=>{
    let w;
    if(weeks===1) w=0;
    else if(s.phase==="early") w=0;
    else if(s.phase==="late") w=weeks-1;
    else w=Math.min(1, weeks-1);
    plan[w].push(s);
  });
  // 中盤が多すぎるときは空いている週に分散
  if(weeks>=4){
    const mid=plan[1];
    if(mid.length>10){
      const half=Math.ceil(mid.length/2);
      plan[2]=mid.slice(half).concat(plan[2]);
      plan[1]=mid.slice(0,half);
    }
  }
  const curWeek=Math.min(weeks-1, Math.max(0, Math.floor((today-addWeeks(dueD,-weeks))/(7*86400000))));
  return {daysLeft, weeks, plan, curWeek};
}
function addWeeks(d,n){ const x=new Date(d); x.setDate(x.getDate()+n*7); return x; }
function renderPlan(){
  const el=$("#tab-plan");
  const d=due();
  let html=`<div class="card"><div class="row">
    <label class="small grow">退去日(立会い日)
      <input type="date" id="dueInput" value="${esc(d)}" style="width:100%"></label>
    <button id="dueSave" class="primary">保存</button>
  </div></div>`;
  const wp=weekPlan();
  if(!wp){
    html+=`<div class="card"><p class="small">退去日を入れると、残り週数に合わせて「今週やること」を自動で組みます。落ちにくいカビ・油(つけ置き系)を先に、ほこり・床の仕上げを最終週に配置します。</p></div>`;
  } else if(wp.daysLeft<0){
    html+=`<div class="notice">退去日を過ぎています。日付を確認してください。</div>`;
  } else {
    html+=`<div class="card"><p>退去まで <b class="pnum">あと${wp.daysLeft}日</b>(残り${wp.weeks}週)</p></div>`;
    // 遅れチェック
    const behind=[];
    wp.plan.forEach((list,i)=>{ if(i<wp.curWeek) list.forEach(s=>{ if(!itemState(s.id).done) behind.push(s); }); });
    if(behind.length) html+=`<div class="notice">⚠ 予定より遅れています(${behind.length}件): ${behind.slice(0,5).map(s=>esc(s.name)).join("、")}${behind.length>5?" ほか":""}。今週に回しましょう。</div>`;
    wp.plan.forEach((list,i)=>{
      const dnW=list.filter(s=>itemState(s.id).done).length;
      html+=`<div class="card weekcard ${i===wp.curWeek?"now":""}">
        <div class="wt">${i===wp.curWeek?"📍 今週":"第"+(i+1)+"週"} <span class="small pnum">${dnW}/${list.length}</span></div>`;
      if(!list.length) html+=`<p class="small">予備週(遅れた分をここで)</p>`;
      list.forEach(s=>{
        const st=itemState(s.id);
        html+=`<div class="stain ${st.done?"done":""}">
          <input type="checkbox" data-done="${s.id}" ${st.done?"checked":""}>
          <button class="nm" data-open="${s.id}"><div class="t">${esc(s.name)}</div>
          <div class="s">${esc(s.place)} / 約${s.time}分</div></button>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  /* 道具の買い物リスト */
  const needTools=new Map();
  activeStains().filter(s=>!itemState(s.id).done).forEach(s=>s.tools.forEach(t=>{
    const base=t.replace(/(スプレー|\(粉\)|\(あれば\)|\(100均\)|等\)|\(.*?\))/g,"").trim()||t;
    if(!needTools.has(base)) needTools.set(base,t);
  }));
  const haveMap=(ROOM.tools)||{};
  html+=`<h2>必要な道具・洗剤(残りの掃除ぶん)</h2><div class="card">
    <p class="small" style="margin-bottom:4px">だいたい100均・ドラッグストアで揃います。持っているものにチェック。</p>`;
  [...needTools.keys()].sort().forEach(t=>{
    const havek=t;
    html+=`<div class="shop-item ${haveMap[havek]?"done":""}">
      <input type="checkbox" data-tool="${esc(havek)}" ${haveMap[havek]?"checked":""}>
      <span class="nm2 grow">${esc(t)}</span></div>`;
  });
  html+=`<button class="ghost" id="toolCopy" style="margin-top:8px;width:100%">📋 未購入分をテキストでコピー</button></div>`;

  el.innerHTML=html;
  $("#dueSave").onclick=()=>{ mutate(["meta","due"],$("#dueInput").value||null); };
  el.querySelectorAll("[data-done]").forEach(c=>c.onchange=()=>mutate(["items",c.dataset.done,"done"],c.checked||null));
  el.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openDetail(b.dataset.open));
  el.querySelectorAll("[data-tool]").forEach(c=>c.onchange=()=>mutate(["tools",c.dataset.tool],c.checked||null));
  $("#toolCopy").onclick=()=>{
    const t="【そうじの買い物リスト】\n"+[...needTools.keys()].sort().filter(k=>!haveMap[k]).map(k=>"・"+k).join("\n");
    copyText(t,$("#toolCopy"),"✅ コピーしました");
  };
}

/* ============ 知識 ============ */
function renderKnow(){
  const el=$("#tab-know");
  el.innerHTML=`<p class="small" style="margin-bottom:8px">頑張りすぎて損しないための知識です。</p>`+
    ARTICLES.map((a,i)=>`<div class="card article"><details ${i===0?"open":""}><summary>${esc(a.t)}</summary>${a.b}</details></div>`).join("");

/* ============ 設定 ============ */
function renderSettings(){
  const el=$("#tab-settings");
  const n=names(); const sync=syncOn();
  el.innerHTML=`
  <div class="card">
    <h2 style="margin-top:0">ふたりの名前(担当表示用)</h2>
    <div class="row">
      <span class="who a"></span><input type="text" id="nameA" value="${esc(n.a)}" style="width:110px">
      <span class="who b"></span><input type="text" id="nameB" value="${esc(n.b)}" style="width:110px">
      <button id="nameSave">保存</button>
    </div>
  </div>
  <div class="card">
    <h2 style="margin-top:0">夫婦で同期 ${sync?`<span class="chip ${connected?"ok":""}">${connected?"接続OK":"オフライン"}</span>`:`<span class="chip">未設定</span>`}</h2>
    ${sync?`
      <p class="small">同期は有効です。もう1台では下の招待コードを「招待コードで参加」に貼り付けてください。</p>
      <div class="row" style="margin-top:8px">
        <button id="btnInvite" class="primary">📋 招待コードをコピー</button>
        <button id="btnUnsync" class="ghost" style="color:var(--warn)">同期を解除</button>
      </div>
    `:`
      <p class="small">「きょうのやること」等で作ったFirebaseがあれば、<b>同じconfigを貼るだけ</b>で使い回せます(データは別の場所に保存されます)。初めて作る場合は <a href="https://gryo1240.github.io/yarukoto/setup.html" target="_blank" rel="noopener" style="color:var(--accent);font-weight:700">かんたん設定ガイド</a> を見ながらどうぞ。</p>
      <div class="f-row" style="margin-top:10px"><div class="lbl">Firebaseの構成(config)を貼り付け</div>
        <textarea id="cfgArea" placeholder='firebaseConfig をまるごと貼り付け'></textarea>
      </div>
      <div class="row"><button class="primary" id="btnNewRoom">同期を開始</button></div>
      <div class="f-row" style="margin-top:12px"><div class="lbl">もう1台のスマホはこちら</div>
        <textarea id="joinArea" placeholder="1台目でコピーした招待コードを貼り付け" style="min-height:70px"></textarea>
        <button id="btnJoin" style="margin-top:6px">招待コードで参加</button>
      </div>
    `}
  </div>
  <div class="card">
    <h2 style="margin-top:0">データ</h2>
    <div class="row">
      <button id="btnExport" class="ghost">書き出す(コピー)</button>
      <button id="btnImport" class="ghost">貼り付けて読み込む</button>
      <button id="btnReset" class="ghost" style="color:var(--warn)">全データ初期化</button>
    </div>
    <textarea id="ioArea" placeholder="書き出し結果 / 読み込み時はここに貼り付け" style="margin-top:8px"></textarea>
  </div>`;
  $("#nameSave").onclick=()=>{ mutate(["meta","names"],{a:$("#nameA").value.trim()||"夫", b:$("#nameB").value.trim()||"妻"}); if(!syncOn()) renderSettings(); };
  if(sync){
    $("#btnInvite").onclick=()=>copyText(inviteCode(), $("#btnInvite"), "✅ コピーしました(相手に送る)");
    $("#btnUnsync").onclick=()=>{
      if(!confirm("同期を解除しますか?(データはFirebase側に残ります)")) return;
      if(fbRef){ fbRef.off(); fbRef=null; }
      S.settings.cfg=null; S.settings.rid=null; connected=false; ROOM=S.local; save(); render();
    };
  }else{
    $("#btnNewRoom").onclick=()=>{
      const p=parseConfig($("#cfgArea").value);
      if(!p){ alert("構成(config)を読み取れませんでした。firebaseConfig 全体を貼り付けてください。"); return; }
      if(p.noDb){ alert("databaseURL が見つかりません。Realtime Database作成後のconfigを貼ってください。"); return; }
      S.settings.cfg=p.cfg;
      S.settings.rid="j"+Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,6);
      save();
      const seed=JSON.parse(JSON.stringify(S.local));
      loadFirebaseSdk(()=>{
        try{
          if(!firebase.apps.length) firebase.initializeApp(S.settings.cfg);
          firebase.database().ref("souji/"+S.settings.rid).update(seed).then(()=>{
            connect(); alert("同期を開始しました。招待コードをコピーして相手に送ってください。"); render();
          }).catch(e=>alert("書き込みに失敗しました: "+e.message));
        }catch(e){ alert("接続に失敗しました: "+e.message); }
      });
    };
    $("#btnJoin").onclick=()=>{
      try{
        const o=JSON.parse(decodeURIComponent(escape(atob($("#joinArea").value.trim()))));
        if(!o.c||!o.r) throw 0;
        if(o.app && o.app!=="souji"){ alert("これは別のアプリの招待コードのようです。"); return; }
        S.settings.cfg=o.c; S.settings.rid=o.r; save(); connect();
        alert("参加しました。数秒で同期されます。"); render();
      }catch(e){ alert("招待コードを読み取れませんでした。"); }
    };
  }
  $("#btnExport").onclick=()=>{
    const t=JSON.stringify({local:syncOn()?ROOM:S.local});
    $("#ioArea").value=t; copyText(t,$("#btnExport"),"✅ コピーしました");
  };
  $("#btnImport").onclick=()=>{
    try{
      const o=JSON.parse($("#ioArea").value); if(!o.local) throw 0;
      if(syncOn()){ alert("同期中は読み込みできません。先に同期を解除してください。"); return; }
      S.local=o.local; ROOM=S.local; save(); render(); alert("読み込みました");
    }catch(e){ alert("読み込めませんでした。"); }
  };
  $("#btnReset").onclick=()=>{
    if(confirm("この端末のデータと設定をすべて消します。よろしいですか?")){
      localStorage.removeItem(KEY); location.reload();
    }
  };
}

function copyText(t,btn,doneLabel,after){
  const ok=()=>{ if(btn) btn.textContent=doneLabel; if(after) setTimeout(after,1200); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok).catch(()=>fb()); } else fb();
  function fb(){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); ok(); }catch(e){ alert("コピーできませんでした"); } ta.remove(); }
}

/* ============ タブ・起動 ============ */
let tab="find";
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click",()=>{ tab=b.dataset.tab; render(); });
});
function render(){
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  ["find","check","plan","know","settings"].forEach(t=>{ $("#tab-"+t).hidden=(t!==tab); });
  if(tab==="find") renderFind();
  if(tab==="check") renderCheck();
  if(tab==="plan") renderPlan();
  if(tab==="know") renderKnow();
  if(tab==="settings") renderSettings();
  const act=activeStains();
  $("#hSub").textContent=`${doneCount(act)}/${act.length} 完了`;
  setStatus(connected);
}
if(syncOn()){ if(S.mirror) ROOM=S.mirror; connect(); }
else ROOM=S.local;
render();
</script>

if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
